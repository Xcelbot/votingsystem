<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
</head>
<body>
    <h2>VOTER REGISTRATION</h2>
    <form id="regForm">
        <!-- Names -->
        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="middle_name" placeholder="Middle Name">
        <input type="text" name="last_name" placeholder="Last Name" required><br><br>

        <!-- IDs -->
        <input type="text" name="school_id" placeholder="School ID" required>
        <input type="email" name="email" placeholder="Email Address" required><br><br>

        <!-- College & Course -->
        <select name="college" id="college_select" required>
            <option value="">Select College</option>
            <option value="College-of-Information-and-Communication-Technology">College of Information and Communication Technology</option>
        </select>

        <select name="course" id="course_select" required>
            <option value="">Select Course</option>
            <optgroup label="CICT Courses" id="group-College-of-Information-and-Communication-Technology" style="display:none;">
                <option value="Bachelor of Science in Information Technology">Bachelor of Science in Information Technology</option>
                <option value="Bachelor of Library and Information Science">Bachelor of Library and Information Science</option>
                <option value="Bachelor of Science in Information Systems">Bachelor of Science in Information Systems</option>
            </optgroup>
        </select>

        <select name="year_level" required>
            <option value="">Year Level</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select><br><br>

        <!-- Security -->
        <input type="password" name="password" id="pass" placeholder="Password" required>
        <input type="password" name="confirm_password" id="cpass" placeholder="Confirm Password" required><br><br>

        <!-- Roles (SuperAdmin 1 is excluded) -->
        <label>Register As:</label>
        <select name="role_id" required>
            <option value="">Select Role</option>
            <option value="2">Election Officer</option>
            <option value="3" selected>Voter</option>
            <option value="4">Auditor</option>
        </select><br><br>

        <button type="submit" id="btn">REGISTER</button>
    </form>

    <script src="../JS/jquery-4.0.0.min.js"></script>
    <script src="../JS/AJAX/register.js"></script>
</body>
</html>
