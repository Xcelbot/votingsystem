<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BSIS Ballot</title>
   
</head>
<body>

    <div class="header" style="background:#343a40; color:white; text-align:center; padding:20px;">
        <h1>YOUR COURSE BALLOT</h1>
        <p>Bachelor of Library and Information Science</p>
    </div>

    <!-- 1. HIDDEN INPUT: Tells the JS to only get BSIT candidates -->
    <input type="hidden" id="course_filter" value="BLIS">

    <div class="container" style="width:80%; margin:auto;">
        <form id="votingForm">
            <div id="ballotArea">
                <!-- AJAX will inject BSIT candidates here -->
            </div>
            <button type="submit" style="margin-top:20px; background:green; color:white; padding:10px;">SUBMIT VOTES</button>
        </form>
    </div>

    <script src="../JS/jquery-4.0.0.min.js"></script>
    <script src="../JS/CONTROLLER(FRONTEND)/voter.js"></script>
</body>
</html>
