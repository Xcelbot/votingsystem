<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MULAT - Candidate Management</title>
    <!-- Basic styling to ensure the dropdowns are visible -->
    <style>
        form select, form input { margin-right: 5px; padding: 5px; }
        table { margin-top: 20px; border-collapse: collapse; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h2>CANDIDATE MANAGEMENT</h2>

    <form id="candidateForm">
        <input type="hidden" name="candidate_id" id="c_id">
        <input type="hidden" name="action" id="action_val" value="add">

        <!-- 1. Unique IDs for Positions -->
        <select name="position_id" id="pos_input" required>
            <option value="">Select Position</option>
            <option value="1">President</option>
            <option value="2">Vice President</option>
            <option value="3">Senator</option>
            <option value="4">Governor</option>
            <option value="5">Vice Governor</option>
            <option value="6">Board Member</option>
        </select>

        <input type="text" name="name" id="name_input" placeholder="Candidate Name" required>
        
        <select name="college" id="college_select" required>
            <option value="">Select College</option>
            <option value="College of Information and Communication Technology">CICT</option>
        </select>

        <!-- 2. FIXED: Removed style="display:none" so courses show up -->
        <select name="course" id="course_select" required>
            <option value="">Select Course</option>
            <optgroup label="CICT Courses" id="group-CICT">
                <option value="BSIT">Bachelor of Science in Information Technology</option>
                <option value="BLIS">Bachelor of Library and Information Science</option>
                <option value="BSIS">Bachelor of Science in Information Systems</option>
            </optgroup>
        </select>

        <button type="submit" id="btn">ADD</button>
        <button type="button" id="cancelBtn" style="display:none;">CANCEL</button>
    </form>

    <hr>
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th width="30%">CANDIDATE NAME</th>
                    <th width="30%">COURSE</th>
                    <th width="30%">COLLEGE</th>
                    <th width="10%">ACTIONS</th>
                </tr>
            </thead>
            <tbody id="presidentData">
                <!-- Data injected via AJAX -->
            </tbody>
        </table>
    </div>

    <!-- Ensure jQuery path is correct -->
    <script src="../JS/jquery-4.0.0.min.js"></script>
    <script src="../JS/CONTROLLER(FRONTEND)/candidate.js"></script>
</body>
</html>
